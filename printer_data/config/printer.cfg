# Klipper Configurations

########################################
# Included Files
########################################

[include cpap.cfg]
[include timelapse.cfg]
# [include pis.cfg]

########################################
# Firmware Settings
########################################

# FYSETC Spider v3 H7
# When running "make menuconfig"
#
# [*] Enable extra low-level configuration options
#     Micro-controller Architecture (STMicroelectronics STM32)  --->
#     Processor model (STM32H723)  --->
#     Bootloader offset (No bootloader)  --->
#     Clock Reference (25 MHz crystal)  --->
#     Communication interface (USB (on PA11/PA12))  --->
#     USB ids  --->
# ()  GPIO pins to set at micro-controller startup
#
# make flash FLASH_DEVICE=0483:df11
#
# Klipperbackup installed


[danger_options]
log_statistics: False
log_config_file_at_startup: False
log_bed_mesh_at_startup: False
temp_ignore_limits: True
autosave_includes: True

########################################
# MCU Settings
########################################

[mcu]
# serial: /dev/ttyACM0
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_420036000D51333235363331-if00
restart_method: command

[temperature_sensor host]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor motherboard]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

########################################
# Printer Settings
########################################
[printer]
kinematics: delta
max_velocity: 1200
max_accel: 40000 
square_corner_velocity: 20
max_z_velocity: 1200
#delta_radius: 173
print_radius: 173 
minimum_z_position:-15

########################################
# A Stepper Motor 
########################################

[stepper_a]
step_pin: PE11                      
dir_pin: !PE10                       
enable_pin: !PE9                   
rotation_distance: 40               
microsteps: 16                      
endstop_pin: ^PA1
#position_endstop: 255
#arm_length = 350 
homing_speed: 50
homing_retract_dist: 3
second_homing_speed: 10

[tmc2209 stepper_a]
uart_pin: PE7
run_current: 1.200
hold_current: 0.200 
sense_resistor: 0.11
stealthchop_threshold: 0

########################################
# A1 Stepper Motor
########################################
[stepper_a1]
step_pin: PD5                      
dir_pin: !PD6                       
enable_pin: !PD4                   
rotation_distance: 40               
microsteps: 16                      

[tmc2209 stepper_a1]
uart_pin: PD7
run_current: 1.200
hold_current: 0.200 
sense_resistor: 0.11
stealthchop_threshold: 0

########################################
# B Stepper Motor
########################################

[stepper_b]
step_pin: PD8
dir_pin: !PB12
enable_pin: !PD9
rotation_distance: 40
microsteps: 16 
endstop_pin: ^PA2 
#position_endstop: 255
#arm_length = 350

[tmc2209 stepper_b]
uart_pin: PE15
run_current: 1.200
hold_current: 0.200 
sense_resistor: 0.11
stealthchop_threshold: 0

########################################
# B1 Stepper Motor
########################################
[stepper_b1]
step_pin: PE6                      
dir_pin: !PC13                       
enable_pin: !PE5                   
rotation_distance: 40               
microsteps: 16                      

[tmc2209 stepper_b1]
uart_pin: PC14
run_current: 1.200
hold_current: 0.200 
sense_resistor: 0.11
stealthchop_threshold: 0

########################################
# C Stepper Motor
########################################

[stepper_c]
step_pin: PD14
dir_pin: !PD13
enable_pin: !PD15
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA3 
#position_endstop: 255
#arm_length = 350

[tmc2209 stepper_c]
uart_pin: PD10
run_current: 1.200
hold_current: 0.200 
sense_resistor: 0.11
stealthchop_threshold: 0

########################################
# C1 Stepper Motor
########################################

[stepper_c1]
step_pin: PE2                      
dir_pin: !PE4                       
enable_pin: !PE3                   
rotation_distance: 40               
microsteps: 16                      

[tmc2209 stepper_c1]
uart_pin: PC15
run_current: 1.200
hold_current: 0.200 
sense_resistor: 0.11
stealthchop_threshold: 0

########################################
# Extruder & Driver Settings
########################################

[extruder]
step_pin: PD12
dir_pin: PC4
enable_pin: !PE8
microsteps: 16
rotation_distance: 4.5
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: Generic 3950
sensor_pin: PC0
max_power: 1
min_temp: -200
max_temp: 315
max_extrude_cross_section: 50
max_extrude_only_distance: 500
pressure_advance: 0.041
pressure_advance_smooth_time: 0.040
#control: pid
#pid_kp: 16.110
#pid_ki: 0.379
#pid_kd: 170.963

[tmc2209 extruder]
uart_pin: PA15
run_current: 0.800
hold_current: 0.200
sense_resistor: 0.11
stealthchop_threshold: 999999

[verify_heater extruder]
max_error: 160
check_gain_time: 30
hysteresis: 5
heating_gain: 2

########################################
# Bed Settings
########################################
[heater_bed]
heater_pin: PB3
sensor_pin: PB0
sensor_type: Generic 3950
min_temp: -5
max_temp: 120
control: pid
pid_kp: 80.041
pid_ki: 2.422
pid_kd: 300.123

########################################
# Probe Settings
########################################

[probe]
pin: ^!PA0
x_offset: 0
y_offset: 0
#z_offset: -0.25
speed: 10
samples: 3
samples_result: average
sample_retract_dist: 5
samples_tolerance: 0.02
samples_tolerance_retries: 7

[delta_calibrate]
radius: 140
horizontal_move_z: 10
Speed: 50

[bed_mesh]  
speed: 50
horizontal_move_z: 7
mesh_radius: 145
mesh_origin: 0,0
mesh_pps: 4,4
round_probe_count: 9
algorithm: bicubic
move_check_distance: 3
fade_start: 0.2
fade_end: 2
zero_reference_position: 0,0

########################################
# Fans Settings 
########################################

[fan]
pin: PA5
cycle_time: 0.0001
max_power: 0.2
tachometer_pin: PA6
tachometer_ppr: 2
tachometer_poll_interval: 0.0001

[gcode_macro _FAN_STATUS]
variable_manual_control: False
variable_min_safe_percent: 50
variable_max_start_percent: 100
variable_start_delay: 1     
variable_last_temp: 0.0
variable_trigger_temp: 50.0
gcode:

[gcode_macro M109]
rename_existing: M109.1
gcode:
  {% set fan_cfg = printer["gcode_macro _FAN_STATUS"] %}
  {% set min_safe_s = (fan_cfg.min_safe_percent / 100) * 255 | int %}
  {% set max_start_s = (fan_cfg.max_start_percent / 100) * 255 | int %}
  M106 S{min_safe_s}
  SET_GCODE_VARIABLE MACRO=_FAN_STATUS VARIABLE=manual_control VALUE=True
  {% if 'S' in params %}
    M109.1 S{params.S}
  {% endif %}
  SET_GCODE_VARIABLE MACRO=_FAN_STATUS VARIABLE=manual_control VALUE=False
  

[gcode_macro M107]
rename_existing: M107.1
gcode:
  {% set fan_cfg = printer["gcode_macro _FAN_STATUS"] %}
  {% set min_safe_s = (fan_cfg.min_safe_percent / 100) * 255 | int %}
  {% set max_start_s = (fan_cfg.max_start_percent / 100) * 255 | int %}
  SET_GCODE_VARIABLE MACRO=_FAN_STATUS VARIABLE=manual_control VALUE=True
  M106 S{max_start_s}
  G4 P{ (fan_cfg.start_delay * 1000) | int }
  M106 S{min_safe_s}
  SET_GCODE_VARIABLE MACRO=_FAN_STATUS VARIABLE=manual_control VALUE=False

[gcode_macro M106]
rename_existing: M106.1
gcode:
  {% set cfg = printer["gcode_macro _FAN_STATUS"] %}
  {% set current_temp = printer.extruder.temperature %}
  {% set user_s = params.S|default(0)|int %}
  {% set user_percent = (user_s / 255) * 100 | int %}
  {% if current_temp >= cfg.trigger_temp %}
    {% if user_percent >= cfg.min_safe_percent %}
      M106.1 S{user_s}
      SET_GCODE_VARIABLE MACRO=_FAN_STATUS VARIABLE=manual_control VALUE=True
    {% endif %}
  {% else %}
    {% set is_manual = (user_s > 0) %}
    M106.1 S{user_s}
    SET_GCODE_VARIABLE MACRO=_FAN_STATUS VARIABLE=manual_control VALUE={is_manual}
  {% endif %}
  
[delayed_gcode _SAFE_FAN_MONITOR]
initial_duration: 1
gcode:
  {% set cfg = printer["gcode_macro _FAN_STATUS"] %}
  {% set current_temp = printer.extruder.temperature %}
  {% set fan_speed = printer.fan.speed %}
  {% set current_percent = (fan_speed * 100) | int %}
  {% set min_safe_s = (cfg.min_safe_percent / 100) * 255 | int %}
  
  {% if current_temp < cfg.trigger_temp and cfg.last_temp >= cfg.trigger_temp and cfg.manual_control %}
    SET_GCODE_VARIABLE MACRO=_FAN_STATUS VARIABLE=manual_control VALUE=False
  {% endif %}
  SET_GCODE_VARIABLE MACRO=_FAN_STATUS VARIABLE=last_temp VALUE={current_temp}

  {% if not cfg.manual_control %}
    {% if current_temp >= cfg.trigger_temp %}
      {% if current_percent < cfg.min_safe_percent %}M106.1 S{min_safe_s}{% endif %}
    {% else %}
      {% if current_percent > 0 %}M106.1 S0{% endif %}
    {% endif %}
  {% endif %}
  
  UPDATE_DELAYED_GCODE ID=_SAFE_FAN_MONITOR DURATION=1

[controller_fan motherboard_fan1]
pin: PA14
fan_speed: 0.4
idle_timeout: 50
idle_speed: 0.2
shutdown_speed: 1

[controller_fan motherboard_fan2]
pin: PB2
fan_speed: 0.8
idle_timeout: 50
idle_speed: 0.4
shutdown_speed: 1

[output_pin test_pin]
pin: PA13

############################################################################################################
# Start / End Gcodes
############################################################################################################
[gcode_macro _START_GCODE]
description: Start Gcodes
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% set HOTEND_TEMP = params.HOTEND_TEMP|default(140)|float %}
  G21
  G90
  M82
  M106 S255
  G4 P2000
  G28
  G4 P1000
  G1 Z150 F6000
  G1 X-152 Y0 Z1 F6000
  M140 S{BED_TEMP}
  M104 S{HOTEND_TEMP}
  M109 S{HOTEND_TEMP}
  G92 E0
  G3 X0 Y-152 I152 J0 Z0.3 E30 F2000
  G1 Z2 F2000
  G92 E0

[gcode_macro _END_GCODE]
description: End Gcodes
gcode:
  M104 S0
  M140 S0
  G92 E0
  G91
  G1 E-1 F2100
  G1 Z+0.5 F6000
  G28

[gcode_macro _START_PRINT]
description: Necessary Start Gcodes
gcode:
  SET_TMC_CURRENT STEPPER=extruder CURRENT={printer.configfile.settings['tmc2209 extruder'].run_current}
  SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity}
  SET_VELOCITY_LIMIT ACCEL={printer.configfile.settings.printer.max_accel}
  SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={printer.configfile.settings.printer.square_corner_velocity}
  CLEAR_PAUSE

[gcode_macro _END_PRINT]
description: Necessary End Gcodes
gcode:
  SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0

##################################################
# Pause / Resume / Cancel Print
##################################################
[gcode_macro PAUSE] 
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
    ##### set defaults #####
    {% set x = params.X|default(0) %}      #edit to your park position
    {% set y = params.Y|default(-120) %}      #edit to your park position
    {% set z = params.Z|default(10)|float %} #edit to your park position
    {% set e = params.E|default(1) %}        #edit to your retract length
    ##### calculate save lift position #####
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% set lift_z = z|abs %}
    {% if act_z < (max_z - lift_z) %}
        {% set z_safe = lift_z %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    ##### end of definitions #####
    PAUSE_BASE
    G91
    {% if printer.extruder.can_extrude|lower == 'true' %}
      G1 E-{e} F2100
    {% else %}
      {action_respond_info("Extruder not hot enough")}
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}    
      G1 Z{z_safe}
      G90
      G1 X{x} Y{y} F6000
    {% else %}
      {action_respond_info("Printer not homed")}
    {% endif %}

[gcode_macro RESUME]  
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
    ##### set defaults #####
      {% set e = params.E|default(1) %} #edit to your retract length
    #### get VELOCITY parameter if specified ####
      {% if 'VELOCITY' in params|upper %}
        {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
      {%else %}
        {% set get_params = "" %}
      {% endif %}
    ##### end of definitions #####
      G91
      {% if printer.extruder.can_extrude|lower == 'true' %}
        G1 E{e} F2100
      {% else %}
        {action_respond_info("Extruder not hot enough")}
      {% endif %}   
      RESUME_BASE {get_params}

[gcode_macro CANCEL_PRINT]
description: Cancel Print
rename_existing: CANCEL_PRINT_BASE
gcode:
  {% set x = params.X|default(0) %}
  {% set y = params.Y|default(0) %}
  {% set z = params.Z|default(10)|float %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% set lift_z = z|abs %}
  {% if act_z >= max_z - 50 %}
    {% set x = 0 %}
    {% set y = 0 %}
  {% endif %}
  {% if act_z < (max_z - lift_z) %}
    {% set z_safe = act_z + lift_z %}
  {% else %}
    {% set z_safe = max_z %}
  {% endif %}
  M106 S255
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE
  G90
  G1 Z{z_safe} F6000
  M400
  G1 X{x} Y{y} F6000
  M400
  G28

##################################################
# Load / Unload Filament
##################################################

[gcode_macro LOAD_FILAMENT]
description: Load Filament
gcode:
  {% set SPEED_FACTOR = printer.gcode_move.speed_factor|float %}
  {% set EXTRUDE_FACTOR = printer.gcode_move.extrude_factor|float %}
  {% set HOTEND_TEMP = params.HOTEND_TEMP|default(230)|float %}
  {% if printer.extruder.temperature < HOTEND_TEMP - 5 %}
    M109 S{HOTEND_TEMP}
  {% endif %}
  M104 S{HOTEND_TEMP}
  RESPOND MSG="Loading filament..."
  G91
  M220 S100
  M221 S100
  G1 E60 F600
  G1 E30 F300
  G1 E30 F300
  M400
  M220 S{SPEED_FACTOR*100}
  M221 S{EXTRUDE_FACTOR*100}
  G90
  SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
  RESPOND MSG="Loading done!"

[gcode_macro UNLOAD_FILAMENT]
description: Unload Filament
gcode:
  {% set SPEED_FACTOR = printer.gcode_move.speed_factor|float %}
  {% set EXTRUDE_FACTOR = printer.gcode_move.extrude_factor|float %}
  {% set HOTEND_TEMP = params.HOTEND_TEMP|default(180)|float %}
  {% if printer.extruder.temperature < HOTEND_TEMP - 5 %}
    M109 S{HOTEND_TEMP}
  {% endif %}
  M104 S{HOTEND_TEMP}
  RESPOND MSG="Unloading filament..."
  G91
  M220 S100
  M221 S100
  G1 E-120 F200
  M400
  M220 S{SPEED_FACTOR*100}
  M221 S{EXTRUDE_FACTOR*100}
  G90
  SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
  RESPOND MSG="Unloading done!"

##################################################
# Calibrations
##################################################

[gcode_macro CALIBRATION_ENDSTOPS]
description: Endstops Phase Calibration
gcode:
  {% if printer.idle_timeout.state == "Printing" %}
  RESPOND TYPE=error MSG="This macro cannot be used while printing!"
  {% else %}
  SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
  {% if printer.toolhead.homed_axes != "xyz" %}
  G28
  {% endif %}
  RESPOND MSG="Starting Endstops Calibration..."
  G91
  G0 Z-40 F1500
  G28
  G91
  G0 Z-75 F1500
  G28
  G91
  G0 Z-100 F1500
  G28
  G91
  G0 Z-40 F1500
  G28
  G91
  G0 Z-30 F1500
  ENDSTOP_PHASE_CALIBRATE stepper=stepper_a
  ENDSTOP_PHASE_CALIBRATE stepper=stepper_b
  ENDSTOP_PHASE_CALIBRATE stepper=stepper_c
  M400
  G28
  SAVE_CONFIG
  {% endif %}

[gcode_macro CALIBRATION_Z_OFFSET]
description: Start Z-Offset Calibration
gcode:
  RESPOND MSG="Starting Z-Offset Calibration..."
  SET_GCODE_OFFSET Z=0
  G28
  G90
  G1 X0 Y0 Z50 F6000
  M400
  PROBE_CALIBRATE

[gcode_macro CALIBRATION_BED]
description: Start Delta Calibration & Bed Leveling
gcode:
  SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
  {% set BED_TEMP=params.BED_TEMP|default(0)|float %}
  {% set HOTEND_TEMP=params.HOTEND_TEMP|default(0)|float %}
  
  {% set ns = namespace(temp_temps={}) %}
  {% set null = ns.temp_temps.update({'BED_TEMP': BED_TEMP}) %}
  {% set null = ns.temp_temps.update({'HOTEND_TEMP': HOTEND_TEMP}) %}
  SAVE_VARIABLE VARIABLE=calibration_temps VALUE="{ns.temp_temps}"
  SET_GCODE_OFFSET Z=0
  BED_MESH_CLEAR
  G28
  M204 S200
  RESPOND MSG="Starting heating..."
  M104 S{HOTEND_TEMP}
  M140 S{BED_TEMP}
  {% if HOTEND_TEMP != 0 %}
    M109 S{HOTEND_TEMP}
  {% endif %}
  M190 S{BED_TEMP}
  RESPOND MSG="Starting Delta Calibration..."
  DELTA_CALIBRATE
  G90
  G1 X0 Y0 Z50 F4200
  G28
  M400
  SAVE_VARIABLE VARIABLE=delta_calibrate VALUE=True
  SAVE_CONFIG

[gcode_macro _CALIBRATION_BED_LEVELING_2]
description: Start Bed Leveling
gcode:
  SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
  {% set calibration_temps = printer.save_variables.variables.calibration_temps %}
  {% set BED_TEMP = calibration_temps.get('BED_TEMP', 0) %}
  {% set HOTEND_TEMP = calibration_temps.get('HOTEND_TEMP', 0) %}
  G28
  M204 S200
  M104 S{HOTEND_TEMP}
  M140 S{BED_TEMP}
  {% if HOTEND_TEMP != 0 %}
    M109 S{HOTEND_TEMP}
  {% endif %}
  M190 S{BED_TEMP}
  RESPOND MSG="Starting Bed Leveling..."
  G90
  G1 X0 Y0 Z50 F4200
  BED_MESH_CALIBRATE
  G1 X0 Y0 Z50 F4200
  G28
  M400
  SAVE_VARIABLE VARIABLE=bed_mesh_calibrate VALUE=True
  SAVE_CONFIG

[gcode_macro CALIBRATION_RESONANCES] 
description: Measuring Resonances
gcode: 
    SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
    RESPOND MSG="Starting Resonances Calibration..."
    {% if printer.toolhead.homed_axes != "xyz" %}
      G28
    {% endif %}
    SHAPER_CALIBRATE
    G28
    M400
    SAVE_VARIABLE VARIABLE=shaper_calibrate VALUE=True
    G4 P1000
    SAVE_CONFIG

[gcode_macro CALIBRATION_PID_BED]
description: Start Bed PID Calibration
gcode:
  {% set BED_TEMP=params.BED_TEMP|default(120)|float %}
  {% if printer.idle_timeout.state == "Printing" %}
    RESPOND TYPE=error MSG="This macro cannot be used while printing!"
  {% else %}
    {% if printer.toolhead.homed_axes != "xyz" %}
      G28
    {% endif %}
    G90
    G1 Z50 F6000
    M400
    M106 S255
    RESPOND MSG="Starting PID Calibration for bed..."
    PID_CALIBRATE HEATER=heater_bed TARGET={BED_TEMP}
    RESPOND MSG="Start heating bed..."
    M190 S{BED_TEMP}
    M107
    G28
    M400
    RESPOND MSG="Bed PID calibration done!"
    SAVE_CONFIG
  {% endif %}

[gcode_macro CALIBRATION_PID_HOTEND]
description: Start Hotend PID Calibration
gcode:
  {% set HOTEND_TEMP=params.HOTEND_TEMP|default(250)|float %}
  {% if printer.idle_timeout.state == "Printing" %}
    RESPOND TYPE=error MSG="This macro cannot be used while printing!"
  {% else %}
    RESPOND MSG="Starting Hotend PID calibration..."
    {% if printer.toolhead.homed_axes != "xyz" %}
      G28
    {% endif %}
    G90
    G1 Z50 F6000
    M400
    M106 S255
    PID_CALIBRATE HEATER=extruder TARGET={HOTEND_TEMP}
    M107
    G28
    M400
    RESPOND MSG="Hotend PID calibration done!"
    SAVE_CONFIG
  {% endif %}

[gcode_macro CALIBRATION_X_OFFSET]
description: Apply a deviation in X axis
gcode:
  {% set MESURED_X_SIZE=params.MESURED_X_SIZE|default(0)|float %}
  {% set TARGET_X_SIZE=params.TARGET_X_SIZE|default(20)|float %}
  M101 X{MESURED_X_SIZE} T{TARGET_X_SIZE}

[gcode_macro CALIBRATION_Y_OFFSET]
description: Apply a deviation in Y axis
gcode:
  {% set MESURED_Y_SIZE=params.MESURED_Y_SIZE|default(0)|float %}
  {% set TARGET_Y_SIZE=params.TARGET_Y_SIZE|default(20)|float %}
  M101 Y{MESURED_Y_SIZE} T{TARGET_Y_SIZE}
  
[gcode_macro CALIBRATION_RESET_XY_OFFSETS]
description: Reset deviations applied to X and Y axis
gcode:
  M101 S0

#############################################################################################################
#GCODE
#############################################################################################################
[gcode_macro M117]
description: Display Message in Console
rename_existing: M117.1
gcode:
  {% if rawparams %}
    {% set escaped_msg = rawparams.split(';', 1)[0].split('\x23', 1)[0]|replace('"', '\"') %}
    SET_DISPLAY_TEXT MSG="{escaped_msg}"
    RESPOND TYPE=command MSG="{escaped_msg}"
  {% else %}
    SET_DISPLAY_TEXT
  {% endif %}
  
[gcode_macro M600]
gcode:
  PAUSE
  
##################################################
# Gcode Offsets Management
##################################################
[gcode_macro SET_GCODE_OFFSET]  
rename_existing: _SET_GCODE_OFFSET
gcode:
    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
    {% else %} 
        {% set offsets = {'x': None,'y': None,'z': None} %}
    {% endif %}
    
    {% set ns = namespace(offsets={'x': offsets.x,'y': offsets.y,'z': offsets.z}) %}
    
    _SET_GCODE_OFFSET {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}

    {%if 'X' in params %}{% set null = ns.offsets.update({'x': params.X}) %}{% endif %}
    {%if 'Y' in params %}{% set null = ns.offsets.update({'y': params.Y}) %}{% endif %}
    {%if 'Z' in params %}{% set null = ns.offsets.update({'z': params.Z}) %}{% endif %}
    {%if 'Z_ADJUST' in params %}
        {%if ns.offsets.z == None %}{% set null = ns.offsets.update({'z': 0}) %}{% endif %}
        {% set null = ns.offsets.update({'z': (ns.offsets.z  | float) + (params.Z_ADJUST | float)}) %}
    {% endif %}
    SAVE_VARIABLE VARIABLE=gcode_offsets VALUE="{ns.offsets}"
    
[gcode_macro Z_OFFSET_APPLY_ENDSTOP]
description: Apply Gcode Offsets to Endstops
rename_existing: _Z_OFFSET_APPLY_ENDSTOP
gcode:
  _Z_OFFSET_APPLY_ENDSTOP
  SET_GCODE_OFFSET Z=0

[delayed_gcode LOAD_BED_MESH]
initial_duration: .01
gcode:
  BED_MESH_PROFILE LOAD=default

[delayed_gcode LOAD_GCODE_OFFSETS]
initial_duration: 2
gcode:  
    {% if printer.save_variables.variables.gcode_offsets %}
        {% set offsets = printer.save_variables.variables.gcode_offsets %}
        _SET_GCODE_OFFSET {% for axis, offset in offsets.items() if offsets[axis] %}{ "%s=%s " % (axis, offset) }{% endfor %}
    {% endif %}
    
    {% if printer.save_variables.variables.delta_calibrate %}
      SAVE_VARIABLE VARIABLE=delta_calibrate VALUE=False
      RESPOND MSG="Delta Calibration done! Bed Leveling will be performed."
      _CALIBRATION_BED_LEVELING_2
    {% endif %}
    
    {% if printer.save_variables.variables.bed_mesh_calibrate %}
      SAVE_VARIABLE VARIABLE=bed_mesh_calibrate VALUE=False
      RESPOND MSG="Bed Leveling done!"
    {% endif %}

    {% if printer.save_variables.variables.shaper_calibrate %}
        SAVE_VARIABLE VARIABLE=shaper_calibrate VALUE=False
		G28
        RESPOND MSG="Resonances Calibration done!"
    {% endif %}
 
[idle_timeout]
gcode:
    SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
    {% if printer.extruder.target > 0 %}
      RESPOND MSG="Timeout reached: Turning off hotend..."
      M104 S0
    {% endif %}
    {% if printer.heater_bed.target > 0 %}
      RESPOND MSG="Timeout reached: Turning off bed..."
      M140 S0
    {% endif %}
    {% if printer.toolhead.homed_axes != "" %}
      RESPOND MSG="Timeout reached: Homing to disable stepper motors..."
      G28
      M84
    {% endif %}
timeout: 1800

