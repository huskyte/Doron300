







########################################
# A Stepper Motor (8/8)
########################################

[stepper_a]
step_pin: PE11                      
dir_pin: !PE10                       
enable_pin: !PE9                   
rotation_distance: 40               
microsteps: 16                      
endstop_pin: ^PA1
#position_endstop: 255
#arm_length = 350 
homing_speed: 50
homing_retract_dist: 3
second_homing_speed: 10

[tmc2240 stepper_a]
cs_pin: PE7
spi_bus: spi4
# diag0_pin: PA0
run_current: 1.200
# hold_current: 0.200 
# sense_resistor: 0.11
stealthchop_threshold: 0
rref: 12300



